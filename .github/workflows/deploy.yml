name: Deploy customer environment

on:
  workflow_dispatch:
    inputs:
      customer:
        description: Customer short name (must match a folder under params/)
        required: true
        type: string
      environment:
        description: Environment short name (dev, test, prod, ...)
        required: true
        type: string
      location:
        description: Azure region
        required: true
        type: string
        default: eastus

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.customer }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.customer }}/${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve parameter file
        id: params
        run: |
          PARAM_FILE="params/${{ inputs.customer }}/${{ inputs.environment }}.bicepparam"
          if [ ! -f "$PARAM_FILE" ]; then
            echo "::error::Parameter file not found: $PARAM_FILE"
            exit 1
          fi
          echo "file=$PARAM_FILE" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create \
              --name "rg-${{ inputs.customer }}-${{ inputs.environment }}" \
              --location "${{ inputs.location }}"

      - name: Deploy Bicep
        uses: azure/cli@v2
        env:
          VM_ADMIN_PASSWORD: ${{ secrets.VM_ADMIN_PASSWORD }}
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --name "deploy-${{ inputs.customer }}-${{ inputs.environment }}-${{ github.run_id }}" \
              --resource-group "rg-${{ inputs.customer }}-${{ inputs.environment }}" \
              --template-file infra/main.bicep \
              --parameters "${{ steps.params.outputs.file }}"
